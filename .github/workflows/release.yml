name: release

# Releases are git tags. A git-based marketplace pins to a tag/SHA, so cutting
# a release = validating structure, checking the tag matches the manifest
# version, and publishing a GitHub release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin structure
        run: claude plugin validate . --strict
      - name: Check tag matches plugin.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(grep -o '"version": *"[^"]*"' .claude-plugin/plugin.json | head -1 | grep -o '[0-9][^"]*')
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag v$tag does not match plugin.json version $manifest."
            exit 1
          fi
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
