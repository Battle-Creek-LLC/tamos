name: validate

on:
  pull_request:
  workflow_dispatch:

jobs:
  # Cheap, always-on: structural validation of the plugin manifest and layout.
  # No API key, no model calls.
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin structure
        run: claude plugin validate . --strict

  # Model-based: runs the five adversarial validators against the guide.
  # Path-filtered so it only fires when enforced-layer files actually change —
  # it costs API tokens and a few minutes, so it does not run on every PR.
  guide-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect enforced-layer changes
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          range="${base:+$base..HEAD}"
          files=$(git diff --name-only ${range:-HEAD~1..HEAD} \
            -- core.md 'register-*.md' AGENT-STYLE.md 'artifacts/*.md' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -n "$files" ]; then echo "run=true" >> "$GITHUB_OUTPUT"; fi
          # No base on workflow_dispatch: the scope arg drops out and the run
          # falls back to a full-layer audit, where every finding blocks.
          echo "scope=${base:+--base $base}" >> "$GITHUB_OUTPUT"
      - name: Install Claude Code CLI
        if: steps.changed.outputs.run == 'true'
        run: npm install -g @anthropic-ai/claude-code
      - name: Wire this checkout's command + validators into the session
        if: steps.changed.outputs.run == 'true'
        # /tamos-validate and agents/ ship in this repo as plugin components, but
        # the plugin is not installed here — so the command was unknown and the job
        # failed before reaching a verdict. Stage them as project-local instead,
        # which also means the PR's own validators judge the PR's own changes.
        run: |
          mkdir -p .claude
          cp -r commands .claude/commands
          cp -r agents .claude/agents
      - name: Fail fast if the API key is missing
        if: steps.changed.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Without this the job dies with an opaque "no verdict" error, which is how
        # guide-review stayed red on every enforced-layer PR without anyone noticing.
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY is not set (repo Settings -> Secrets)."
            echo "::error::guide-review cannot run. See docs/user-guide.md -> CI/CD."
            exit 1
          fi
      - name: Run TAMOS validator suite
        if: steps.changed.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -o pipefail
          claude -p "/tamos-validate ${{ steps.changed.outputs.files }} ${{ steps.changed.outputs.scope }}" \
            --max-turns 20 --permission-mode bypassPermissions | tee result.txt
          if grep -q 'TAMOS-VALIDATE: FAIL' result.txt; then
            echo "::error::TAMOS validators found defects this PR introduced."
            exit 1
          fi
          grep -q 'TAMOS-VALIDATE: PASS' result.txt || {
            echo "::error::No TAMOS verdict emitted — treating as failure."; exit 1; }
